<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D Battle Map</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0d0d1a;
      color: #ddd;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #12122a;
      border-bottom: 2px solid #8b0000;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.3rem;
      color: #c0392b;
      letter-spacing: 0.05em;
    }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(1.2); }
    .btn-dark {
      background: #1e1e3a;
      color: #ccc;
      border: 1px solid #333;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #1e1e3a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 3px 6px;
    }

    .zoom-controls button {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .zoom-controls button:hover { background: #2e2e5a; color: #fff; }

    .zoom-label {
      font-size: 0.78rem;
      color: #888;
      min-width: 38px;
      text-align: center;
    }

    /* ── Connection status ── */
    .conn-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #666;
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.4s;
    }
    .conn-dot.online  { background: #27ae60; }
    .conn-dot.offline { background: #c0392b; }

    /* ── Main layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      min-width: 200px;
      background: #12122a;
      padding: 16px;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.25s ease, min-width 0.25s ease, padding 0.25s ease;
    }

    .sidebar.collapsed {
      width: 0;
      min-width: 0;
      padding: 0;
    }

    /* The thin strip that toggles the sidebar open/closed */
    .sidebar-toggle {
      width: 16px;
      background: #1a1a32;
      border: none;
      border-left:  1px solid #2a2a4a;
      border-right: 1px solid #2a2a4a;
      color: #556;
      cursor: pointer;
      font-size: 0.6rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .sidebar-toggle:hover {
      background: #2a2a4a;
      color: #aaa;
    }

    .sidebar-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      margin-bottom: 10px;
    }

    .sidebar-empty {
      font-size: 0.78rem;
      color: #444;
      text-align: center;
      padding: 20px 0;
      line-height: 1.6;
    }

    /* ── Map area ── */
    .map-area {
      flex: 1;
      overflow: auto;
      background: #080810;
    }

    /* Canvas sized dynamically by JS — just enough padding around the grid.
       The grid sits in the exact centre. */
    .map-inner {
      position: relative;
      /* width & height set by JS in resizeCanvas() */
    }

    .grid-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* ── Grid ── */

    /* Background image layer (empty for now) */
    #grid-bg {
      position: absolute;
      inset: 0;
      background-color: #1a1a2e;
      background-size: cover;
      background-position: center;
    }

    #grid {
      display: grid;
      position: relative; /* tokens will be positioned inside here later */
      border: 2px solid #5a5a8a;
    }

    .cell {
      width: 70px;
      height: 70px;
      border: 1px solid rgba(120, 120, 180, 0.3);
    }

    /* Subtle checkerboard tint to help count squares */
    .cell.shade {
      background: rgba(255, 255, 255, 0.02);
    }

    /* ── Buttons ── */
    .btn-red {
      background: #c0392b;
      color: #fff;
    }

    /* ── Token chip on the board ── */
    .token {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.45);
      box-shadow: 0 2px 8px rgba(0,0,0,0.6), inset 0 -2px 4px rgba(0,0,0,0.35);
      user-select: none;
      touch-action: none;
      z-index: 10;
      cursor: grab;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .token:hover {
      transform: scale(1.08);
      z-index: 20;
      border-color: rgba(255,255,255,0.8);
    }
    .token.dragging {
      cursor: grabbing;
      transform: scale(1.12);
      z-index: 100;
      opacity: 0.9;
      box-shadow: 0 8px 20px rgba(0,0,0,0.8);
      transition: none; /* instant movement while dragging */
    }

    /* Highlight cells the token will land on */
    .cell.drag-over {
      background: rgba(192, 57, 43, 0.25) !important;
      border-color: rgba(192, 57, 43, 0.7) !important;
    }

    .token-label {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.82);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 3px;
      white-space: nowrap;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    /* ── Sidebar token cards ── */
    .token-card {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a30;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 6px;
    }

    .mini-chip {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: bold;
      color: #fff;
    }

    .token-card-name {
      flex: 1;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .del-btn {
      position: relative;
      width: 26px;
      height: 26px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .del-ring {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);  /* start fill from the top */
      pointer-events: none;
    }

    .ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.07);
      stroke-width: 2.5;
    }

    .ring-fill {
      fill: none;
      stroke: #c0392b;
      stroke-width: 2.5;
      stroke-dasharray: 62.83;   /* 2 * π * r(10) */
      stroke-dashoffset: 62.83;  /* fully hidden at start */
      transition: none;
    }

    /* When holding: animate the ring filling over 1 second */
    .del-btn.holding .ring-fill {
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .del-icon {
      font-size: 0.72rem;
      color: #555;
      pointer-events: none;
      position: relative;
    }
    .del-btn:hover .del-icon   { color: #aaa; }
    .del-btn.holding .del-icon { color: #c0392b; }

    /* ── Add Token modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .overlay.show { display: flex; }

    .modal {
      background: #12122a;
      border: 1px solid #2a2a50;
      border-radius: 12px;
      padding: 24px;
      width: 300px;
      max-width: calc(100vw - 32px);
    }

    .modal h2 {
      font-size: 1rem;
      color: #c0392b;
      margin-bottom: 18px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 0.78rem;
      color: #999;
      margin-bottom: 5px;
    }
    .field input[type="text"] {
      width: 100%;
      background: #1a1a30;
      border: 1px solid #2a2a50;
      border-radius: 6px;
      color: #eee;
      padding: 8px 10px;
      font-size: 0.88rem;
      outline: none;
    }
    .field input[type="text"]:focus { border-color: #c0392b; }
    .field input[type="text"].error {
      border-color: #c0392b;
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    .field input[type="color"] {
      width: 48px;
      height: 34px;
      border: 1px solid #2a2a50;
      border-radius: 6px;
      background: #1a1a30;
      cursor: pointer;
      padding: 2px;
    }

    .field select {
      width: 100%;
      background: #1a1a30;
      border: 1px solid #2a2a50;
      border-radius: 6px;
      color: #eee;
      padding: 8px 10px;
      font-size: 0.88rem;
      outline: none;
      cursor: pointer;
    }
    .field select:focus { border-color: #c0392b; }

    .size-badge {
      font-size: 0.65rem;
      color: #888;
      background: #1a1a30;
      border: 1px solid #2a2a4a;
      border-radius: 3px;
      padding: 1px 5px;
      white-space: nowrap;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    /* Hide the real file input, style the label as a button */
    input[type="file"] { display: none; }

    .btn-ghost {
      background: none;
      color: #c0392b;
      border: 1px solid #c0392b;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: none; /* shown by JS when a map is loaded */
    }
    .btn-ghost:hover { background: rgba(192,57,43,0.15); }
    .btn-ghost.visible { display: inline-block; }

    /* ── Token condition ring & tooltip ── */
    .token.has-condition {
      box-shadow: 0 2px 8px rgba(0,0,0,0.6), inset 0 -2px 4px rgba(0,0,0,0.35),
                  0 0 0 3px rgba(255,255,255,0.9);
    }
    .token.dragging.has-condition {
      box-shadow: 0 8px 20px rgba(0,0,0,0.8), 0 0 0 3px rgba(255,255,255,0.9);
    }

    .token-tooltip {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.88);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 5px 9px;
      border-radius: 5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 30;
      border: 1px solid rgba(255,255,255,0.15);
      max-width: 160px;
      white-space: normal;
      text-align: center;
      line-height: 1.4;
    }
    .token:hover .token-tooltip { opacity: 1; }

    /* ── Edit (pencil) button in sidebar ── */
    .edit-btn {
      width: 26px;
      height: 26px;
      border: none;
      background: none;
      cursor: pointer;
      color: #555;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 4px;
      padding: 0;
    }
    .edit-btn:hover { color: #aaa; background: #2a2a4a; }

    /* ── Crop modal ── */
    .crop-modal {
      background: #12122a;
      border: 1px solid #2a2a50;
      border-radius: 12px;
      padding: 24px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .crop-modal h2 {
      font-size: 1rem;
      color: #c0392b;
      margin: 0;
    }

    /* ── Edit Token modal ── */
    .edit-section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 8px;
    }

    .edit-portrait-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .edit-portrait-preview {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #1a1a30;
      border: 2px solid #2a2a4a;
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: bold;
      color: #555;
    }

    .edit-condition-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .edit-condition-row input {
      flex: 1;
      background: #1a1a30;
      border: 1px solid #2a2a50;
      border-radius: 6px;
      color: #eee;
      padding: 6px 10px;
      font-size: 0.85rem;
      outline: none;
    }
    .edit-condition-row input:focus { border-color: #c0392b; }

    .condition-tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }

    .condition-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #1e1e3a;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      padding: 3px 8px 3px 11px;
      font-size: 0.76rem;
      color: #ccc;
    }

    .condition-tag-remove {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .condition-tag-remove:hover { color: #c0392b; }

    .crop-container {
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .crop-container img {
      display: block;
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .crop-circle {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      cursor: move;
      z-index: 10;
      touch-action: none;
    }

    /* ── Draw toolbar ── */
    .draw-toolbar {
      display: none;
      background: #0f0f22;
      border-bottom: 1px solid #2a2a4a;
      padding: 6px 16px;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .draw-toolbar.show { display: flex; }

    .draw-tool {
      width: 32px;
      height: 32px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1e1e3a;
      color: #aaa;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .draw-tool:hover { background: #2e2e5a; color: #fff; }
    .draw-tool.active { background: #c0392b; border-color: #c0392b; color: #fff; }

    .draw-sep {
      width: 1px;
      height: 22px;
      background: #2a2a4a;
      flex-shrink: 0;
    }

    .draw-color-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1e1e3a;
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
    }

    .draw-width-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: #666;
    }
    .draw-width-row input[type="range"] {
      width: 70px;
      accent-color: #c0392b;
    }

    .draw-zone-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #888;
    }

    /* ── Zone overlays ── */
    #zones-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .zone-overlay {
      position: absolute;
      border-radius: 2px;
      pointer-events: auto;
      cursor: default;
    }
    .zone-overlay.selected {
      outline: 2px solid rgba(255,255,255,0.8);
      outline-offset: -1px;
    }

    /* Floating tooltip for zones and strokes */
    #stroke-tooltip {
      position: fixed;
      background: rgba(0,0,0,0.88);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 5px;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.15);
      display: none;
    }

    /* ── SVG stroke layer ── */
    #stroke-layer {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 6;
      overflow: visible;
    }

    /* ── Draw capture layer ── */
    #draw-capture-layer {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      cursor: crosshair;
    }
    #draw-capture-layer.mode-eraser { cursor: cell; }

    /* Draw mode button active */
    #draw-mode-btn.active {
      background: #8b0000;
      color: #fff;
      border-color: #8b0000;
    }

    /* ── Map themes ── */

    /* Cobblestone */
    #grid.theme-cobblestone { border-color: #1a1410; }
    .theme-cobblestone .cell       { border-color: #181410; background: url('./tiles/Cobble 1.jpg') center/cover no-repeat; }
    .theme-cobblestone .cell.shade { border-color: #181410; background: url('./tiles/Cobble 2.jpg') center/cover no-repeat; }
    /* Forest */
    #grid.theme-forest { border-color: #1a1a0a; }
    .theme-forest .cell       { border-color: #141208; background: url('./tiles/Grass tile 1.png') center/cover no-repeat; }
    .theme-forest .cell.shade { border-color: #141208; background: url('./tiles/Grass tile 2.png') center/cover no-repeat; }
    /* Desert */
    #grid.theme-desert { border-color: #7a5a20; }
    .theme-desert .cell       { border-color: #8a6828; background: url('./tiles/Sand 1.jpg') center/cover no-repeat; }
    .theme-desert .cell.shade { border-color: #8a6828; background: url('./tiles/Sand 2.jpg') center/cover no-repeat; }
    /* Water */
    #grid.theme-water { border-color: #0a1a2a; }
    .theme-water .cell       { border-color: #0a1428; background: url('./tiles/Water 1.jpg') center/cover no-repeat; }
    .theme-water .cell.shade { border-color: #0a1428; background: url('./tiles/Water 2.jpg') center/cover no-repeat; }
    /* Volcanic */
    #grid.theme-volcanic { border-color: #2a0a00; }
    .theme-volcanic .cell       { border-color: #1a0800; background: url('./tiles/Volcanic 1.jpg') center/cover no-repeat; }
    .theme-volcanic .cell.shade { border-color: #1a0800; background: url('./tiles/Volcanic 2.jpg') center/cover no-repeat; }

    /* Keep drag-over highlight working on top of any theme */
    .cell.drag-over {
      background: rgba(192, 57, 43, 0.35) !important;
      border-color: rgba(192, 57, 43, 0.8) !important;
      box-shadow: none !important;
    }

    /* Theme selector */
    #theme-select {
      background: #1e1e3a;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0 8px;
      height: 32px;
      outline: none;
    }
    #theme-select:hover { filter: brightness(1.2); }

    /* ── Map Editor modal ── */
    .map-editor-modal {
      background: #12122a;
      border: 1px solid #2a2a50;
      border-radius: 12px;
      padding: 24px;
      width: 520px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 64px);
      overflow-y: auto;
    }
    .map-editor-modal h2 {
      font-size: 1rem;
      color: #c0392b;
      margin-bottom: 18px;
    }
    .editor-dims {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .editor-dims label { font-size: 0.78rem; color: #999; }
    .editor-dims input[type="number"] {
      width: 60px;
      background: #1a1a30;
      border: 1px solid #2a2a50;
      border-radius: 6px;
      color: #eee;
      padding: 6px 8px;
      font-size: 0.88rem;
      outline: none;
      text-align: center;
    }
    .editor-dims input[type="number"]:focus { border-color: #c0392b; }
    .editor-dims span { color: #555; font-size: 1rem; }
    .editor-hint {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 10px;
    }
    .editor-grid-wrap {
      border: 1px solid #2a2a50;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 16px;
      user-select: none;
    }
    .editor-grid {
      display: grid;
      width: 100%;
    }
    .editor-cell {
      aspect-ratio: 1;
      background: #2a3a28;
      border: 1px solid #1a1a2a;
      cursor: pointer;
      transition: background 0.08s;
    }
    .editor-cell.void            { background: #080810; }
    .editor-cell.tile-default      { background: #1a1a2e; }
    .editor-cell.tile-cobblestone  { background: #6a5a4a; }
    .editor-cell.tile-forest       { background: #7a9a52; }
    .editor-cell.tile-desert       { background: #d4b870; }
    .editor-cell.tile-water        { background: #1a3a5a; }
    .editor-cell.tile-volcanic     { background: #3a1200; }
    /* Main grid void cells */
    .cell.cell-void {
      background: #000 !important;
      border-color: #111 !important;
      box-shadow: none !important;
    }
    /* Per-cell tile overrides — override board theme */
    #grid .cell.tile-default       { background: #1a1a2e; border-color: rgba(120,120,180,0.3); box-shadow: none; }
    #grid .cell.tile-default.shade { background: #14142a; }
    #grid .cell.tile-cobblestone       { border-color: #181410; background: url('./tiles/Cobble 1.jpg') center/cover no-repeat; }
    #grid .cell.tile-cobblestone.shade { border-color: #181410; background: url('./tiles/Cobble 2.jpg') center/cover no-repeat; }
    #grid .cell.tile-forest            { border-color: #141208; background: url('./tiles/Grass tile 1.png') center/cover no-repeat; }
    #grid .cell.tile-forest.shade      { border-color: #141208; background: url('./tiles/Grass tile 2.png') center/cover no-repeat; }
    #grid .cell.tile-desert            { border-color: #8a6828; background: url('./tiles/Sand 1.jpg') center/cover no-repeat; }
    #grid .cell.tile-desert.shade      { border-color: #8a6828; background: url('./tiles/Sand 2.jpg') center/cover no-repeat; }
    #grid .cell.tile-water             { border-color: #0a1428; background: url('./tiles/Water 1.jpg') center/cover no-repeat; }
    #grid .cell.tile-water.shade       { border-color: #0a1428; background: url('./tiles/Water 2.jpg') center/cover no-repeat; }
    #grid .cell.tile-volcanic          { border-color: #1a0800; background: url('./tiles/Volcanic 1.jpg') center/cover no-repeat; }
    #grid .cell.tile-volcanic.shade    { border-color: #1a0800; background: url('./tiles/Volcanic 2.jpg') center/cover no-repeat; }
    /* Mode toggle */
    .editor-mode-toggle {
      display: flex;
      margin-bottom: 16px;
      border: 1px solid #2a2a50;
      border-radius: 6px;
      overflow: hidden;
    }
    .mode-btn {
      flex: 1;
      background: #1a1a30;
      border: none;
      color: #888;
      padding: 7px 0;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-btn:hover  { background: #22223a; color: #bbb; }
    .mode-btn.active { background: #c0392b; color: #fff; }
    /* Tile palette */
    .tile-palette {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .palette-swatch {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.12s;
      user-select: none;
    }
    .palette-swatch.selected        { border-color: #fff; }
    .palette-swatch[data-tile="void"]    { background: #080810; color: #888; }
    .palette-swatch[data-tile="erase"]   { background: #1a1a30; color: #666; border: 2px dashed #444; }
    .palette-swatch[data-tile="erase"].selected { border-color: #888; }
    .palette-swatch[data-tile="default"]      { background: #1a1a2e; color: #aaa; }
    .palette-swatch[data-tile="cobblestone"]  { background: #6a5a4a; color: #ddd; }
    .palette-swatch[data-tile="forest"]       { background: #7a9a52; color: #111; }
    .palette-swatch[data-tile="desert"]       { background: #d4b870; color: #111; }
    .palette-swatch[data-tile="water"]        { background: #1a3a5a; color: #aaa; }
    .palette-swatch[data-tile="volcanic"]     { background: #3a1200; color: #aaa; }

    /* Zone label modal */
    .zone-label-modal {
      background: #12122a;
      border: 1px solid #2a2a50;
      border-radius: 12px;
      padding: 20px 24px;
      width: 280px;
      max-width: calc(100vw - 32px);
    }
    .zone-label-modal h2 {
      font-size: 1rem;
      color: #c0392b;
      margin-bottom: 16px;
    }

  </style>
</head>
<body>

  <header>
    <h1>⚔ D&D Battle Map</h1>
    <div class="conn-pill">

  <!-- Edit Token modal -->

  <!-- Zone / stroke label modal -->
  <div class="overlay" id="zone-modal">
    <div class="zone-label-modal">
      <h2 id="zone-modal-title">New Zone</h2>

  </div>

  <!-- Add Token modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Add Token</h2>
      <div class="field">
        <label>Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Gandalf" maxlength="20">

        <label>Size</label>
        <select id="f-size">
          <option value="small">Small — 5×5 ft (1 square)</option>
          <option value="medium" selected>Medium — 5×5 ft (1 square)</option>
          <option value="large">Large — 10×10 ft (2×2 squares)</option>
          <option value="huge">Huge — 15×15 ft (3×3 squares)</option>
        </select>
      </div>

        <button class="btn btn-red"  id="modal-save">Add</button>
      </div>
    </div>
  </div>

  <div id="stroke-tooltip"></div>

  <script type="module">
    import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, remove, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ── Firebase setup ──────────────────────────────────────────
    const app = initializeApp({
      apiKey:            "AIzaSyCLjGHc9VR1ah4VGc4nVsID6VbLjvtWMUY",
      authDomain:        "dnd-battle-map-4e065.firebaseapp.com",
      databaseURL:       "https://dnd-battle-map-4e065-default-rtdb.firebaseio.com",
      projectId:         "dnd-battle-map-4e065",
      storageBucket:     "dnd-battle-map-4e065.firebasestorage.app",
      messagingSenderId: "631966836270",
      appId:             "1:631966836270:web:58fcffd10d1590f9dce1bf"
    });

    const db      = getDatabase(app);
    const connDot  = document.getElementById('conn-dot');
    const connText = document.getElementById('conn-text');

    // Firebase has a special path that tells us if we're connected
    onValue(ref(db, '.info/connected'), (snap) => {
      if (snap.val() === true) {
        connDot.className  = 'conn-dot online';
        connText.textContent = 'Connected';
      } else {
        connDot.className  = 'conn-dot offline';
        connText.textContent = 'Disconnected';
      }
    });

    // ── Background map ──────────────────────────────────────────
    const gridBg      = document.getElementById('grid-bg');
    const clearMapBtn = document.getElementById('clear-map-btn');

    // Compress an image to fit within maxW x maxH at given quality
    function compressImage(file, maxW, maxH, quality = 0.85) {
      return new Promise((resolve) => {
        const img    = new Image();
        const reader = new FileReader();
        reader.onload = (e) => {
          img.onload = () => {
            const ratio  = Math.min(maxW / img.width, maxH / img.height, 1);
            const canvas = document.createElement('canvas');
            canvas.width  = Math.round(img.width  * ratio);
            canvas.height = Math.round(img.height * ratio);
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // Upload map: compress then push to Firebase
    document.getElementById('bg-upload').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      // Store at 2× for sharp display on high-DPI screens
      const dataUrl = await compressImage(file, 1120, 1540);
      set(ref(db, 'board/background'), dataUrl);
      e.target.value = ''; // allow re-uploading same file
    });

    // Clear map button
    clearMapBtn.addEventListener('click', () => {
      set(ref(db, 'board/background'), null);
    });

    // Listen for background changes from Firebase
    onValue(ref(db, 'board/background'), (snap) => {
      const url = snap.val();
      if (url) {
        gridBg.style.backgroundImage = `url(${url})`;
        clearMapBtn.classList.add('visible');
      } else {
        gridBg.style.backgroundImage = '';
        clearMapBtn.classList.remove('visible');
      }
    });

    // Listen for grid dimension changes — fired on ALL connected clients
    onValue(ref(db, 'board/cols'), (snap) => {
      if (snap.val() !== null) GRID_COLS = snap.val();
      buildGrid();
    });
    onValue(ref(db, 'board/rows'), (snap) => {
      if (snap.val() !== null) GRID_ROWS = snap.val();
      buildGrid();
    });

    // Listen for orientation changes — fired on ALL connected clients
    onValue(ref(db, 'board/orientation'), (snap) => {
      if (snap.val() !== null) isPortrait = snap.val();
      buildGrid();
    });

    // ── Map theme ────────────────────────────────────────────────
    let boardTheme = 'default';

    function applyTheme(theme) {
      boardTheme = theme;
      const themeClasses = { cobblestone: 'theme-cobblestone', forest: 'theme-forest', desert: 'theme-desert', water: 'theme-water', volcanic: 'theme-volcanic' };
      const bgColors     = { cobblestone: '#0e0c0a', forest: '#080e04', desert: '#3a2808', water: '#02080e', volcanic: '#100400' };
      grid.className = themeClasses[theme] || '';
      document.getElementById('grid-bg').style.backgroundColor = bgColors[theme] || '#1a1a2e';
    }

    onValue(ref(db, 'board/theme'), (snap) => {
      applyTheme(snap.val() || 'default');
      document.getElementById('theme-select').value = boardTheme;
    });

    document.getElementById('theme-select').addEventListener('change', (e) => {
      set(ref(db, 'board/theme'), e.target.value);
    });

    // ── Grid & UI ───────────────────────────────────────────────
    const grid        = document.getElementById('grid');
    const zoomLabel   = document.getElementById('zoom-label');
    const mapArea     = document.getElementById('map-area');

    const BASE_CELL   = 70;   // px at 100%
    const ZOOM_STEPS  = [40, 50, 60, 75, 100, 125, 150, 175, 200];
    let zoomIndex     = 4;    // start at index 4 = 100%
    let isPortrait    = true;

    function cellSize() {
      return Math.round(BASE_CELL * ZOOM_STEPS[zoomIndex] / 100);
    }

    // ── Coordinate helpers (variable grid size, synced from Firebase) ────────────
    let GRID_COLS = 8, GRID_ROWS = 11;
    let boardCells = {};   // { "r_c": true } for void cells; absence = active

    // Convert logical (col, row) → pixel (left, top) of cell top-left
    function cellPixel(col, row) {
      const cs = cellSize();
      if (isPortrait) return { left: col * cs, top: row * cs };
      return { left: (GRID_ROWS - 1 - row) * cs, top: col * cs };
    }

    // Convert grid-relative screen (x, y) → logical fractional (fracCol, fracRow)
    function screenToFrac(x, y) {
      const cs = cellSize();
      if (isPortrait) return { fracCol: x / cs, fracRow: y / cs };
      return { fracCol: y / cs, fracRow: GRID_ROWS - x / cs };
    }

    function buildGrid() {
      const cs    = cellSize();
      const gridW = isPortrait ? GRID_COLS * cs : GRID_ROWS * cs;
      const gridH = isPortrait ? GRID_ROWS * cs : GRID_COLS * cs;

      // Switch from CSS grid to absolute positioning
      grid.style.gridTemplateColumns = '';
      grid.style.gridTemplateRows    = '';
      grid.style.display = 'block';
      grid.style.width   = gridW + 'px';
      grid.style.height  = gridH + 'px';

      // Preserve the drawing layers before clearing
      const zonesLayer  = document.getElementById('zones-layer');
      const strokeLayer = document.getElementById('stroke-layer');
      const captLayer   = document.getElementById('draw-capture-layer');

      grid.innerHTML = '';
      // Always iterate row-major in logical space: children[row*GRID_COLS+col] = cell(col,row)
      for (let r = 0; r < GRID_ROWS; r++) {
        for (let c = 0; c < GRID_COLS; c++) {
          const { left, top } = cellPixel(c, r);
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.style.position = 'absolute';
          cell.style.width    = cs + 'px';
          cell.style.height   = cs + 'px';
          cell.style.left     = left + 'px';
          cell.style.top      = top  + 'px';
          if ((r + c) % 2 === 0) cell.classList.add('shade');
          const tileType = boardCells[r + '_' + c];
          if (tileType === 'void' || tileType === true) cell.classList.add('cell-void');
          else if (tileType) cell.classList.add('tile-' + tileType);
          grid.appendChild(cell);
        }
      }

      // Re-append layers
      grid.appendChild(zonesLayer);
      grid.appendChild(strokeLayer);
      grid.appendChild(captLayer);

      // Update SVG dimensions to match grid visual size
      strokeLayer.setAttribute('width',  gridW + 'px');
      strokeLayer.setAttribute('height', gridH + 'px');

      zoomLabel.textContent = ZOOM_STEPS[zoomIndex] + '%';
      renderZones();
      renderStrokes();
      renderTokens();
      resizeAndCenterMap();
    }

    function zoomIn() {
      if (zoomIndex < ZOOM_STEPS.length - 1) { zoomIndex++; buildGrid(); }
    }

    function zoomOut() {
      if (zoomIndex > 0) { zoomIndex--; buildGrid(); }
    }

    document.getElementById('zoom-in').addEventListener('click', zoomIn);
    document.getElementById('zoom-out').addEventListener('click', zoomOut);

    document.getElementById('rotate-btn').addEventListener('click', () => {
      // Rotating is a pure display change — no coordinates are moved or deleted.
      // The grid dimensions come from Firebase (board/cols × board/rows); landscape just renders it 90° clockwise.
      set(ref(db, 'board/orientation'), !isPortrait);
    });

    // Ctrl + scroll wheel to zoom
    document.querySelector('.map-area').addEventListener('wheel', (e) => {
      if (!e.ctrlKey) return;
      e.preventDefault();
      e.deltaY < 0 ? zoomIn() : zoomOut();
    }, { passive: false });

    // Resize the canvas to just fit the grid + comfortable padding, then centre
    function resizeAndCenterMap() {
      const mapArea = document.querySelector('.map-area');
      const inner   = document.querySelector('.map-inner');
      const cols    = isPortrait ? GRID_COLS : GRID_ROWS;
      const rows    = isPortrait ? GRID_ROWS : GRID_COLS;
      const cs      = cellSize();
      const gridW   = cols * cs + 4;   // +4 for the 2px border each side
      const gridH   = rows * cs + 4;
      const pad     = Math.max(80, cs * 2);   // at least 80px, or 2 cells

      // Canvas must be at least as large as the viewport so centering works
      const canvasW = Math.max(gridW + pad * 2, mapArea.clientWidth);
      const canvasH = Math.max(gridH + pad * 2, mapArea.clientHeight);

      inner.style.width  = canvasW + 'px';
      inner.style.height = canvasH + 'px';

      requestAnimationFrame(() => {
        mapArea.scrollLeft = (mapArea.scrollWidth  - mapArea.clientWidth)  / 2;
        mapArea.scrollTop  = (mapArea.scrollHeight - mapArea.clientHeight) / 2;
      });
    }

    // ── Token state ────────────────────────────────────────────
    let tokens = {};

    // Listen for any token changes in Firebase → re-render
    onValue(ref(db, 'board/tokens'), (snap) => {
      tokens = snap.val() || {};
      renderTokens();
      renderSidebar();
      refreshEditModal();
    });

    // How many grid squares does this size occupy?
    function sizeToSquares(size) {
      if (size === 'large') return 2;
      if (size === 'huge')  return 3;
      return 1;
    }

    // Work out token pixel size & position from current zoom + creature size
    function tokenLayout(row, col, size) {
      const cs  = cellSize();
      const sq  = sizeToSquares(size);
      if (sq === 1) {
        const ts     = Math.max(20, Math.round(cs * 0.76));
        const offset = Math.round((cs - ts) / 2);
        const { left, top } = cellPixel(col, row);
        return { ts, top: top + offset, left: left + offset };
      }
      // Multi-square: fill the squares with a small inset so grid lines show
      const inset = 4;
      const ts    = sq * cs - inset;
      if (isPortrait) {
        return { ts, top: row * cs + inset / 2, left: col * cs + inset / 2 };
      }
      // Landscape: token spans rows row..row+sq-1; left edge is the cell with largest row
      return { ts, top: col * cs + inset / 2, left: (GRID_ROWS - row - sq) * cs + inset / 2 };
    }

    let draggingId = null;

    function renderTokens() {
      // Remove every token except the one currently being dragged
      grid.querySelectorAll('.token').forEach(el => {
        if (el.dataset.id !== draggingId) el.remove();
      });
      Object.values(tokens).forEach(t => {
        if (t.id === draggingId) return; // leave the live drag element alone
        grid.appendChild(buildTokenEl(t));
      });
    }

    function buildTokenEl(t) {
      const { ts, top, left } = tokenLayout(t.row, t.col, t.size);
      const el = document.createElement('div');
      el.className  = 'token';
      el.dataset.id = t.id;
      el.style.cssText = `width:${ts}px;height:${ts}px;top:${top}px;left:${left}px;background:${t.color||'#c0392b'};`;

      // Initial letter (hidden when a portrait image is set)
      const letter = document.createElement('span');
      letter.style.fontSize = Math.max(8, Math.round(ts * 0.42)) + 'px';
      letter.textContent = (t.name || '?')[0].toUpperCase();
      el.appendChild(letter);

      if (t.image) {
        el.style.backgroundImage    = `url(${t.image})`;
        el.style.backgroundSize     = 'cover';
        el.style.backgroundPosition = 'center';
        letter.style.display = 'none';
      }

      // Condition ring + tooltip
      const conditions = Object.values(t.conditions || {});
      if (conditions.length > 0) {
        el.classList.add('has-condition');
        const tip = document.createElement('div');
        tip.className   = 'token-tooltip';
        tip.textContent = conditions.join(' · ');
        el.appendChild(tip);
      }

      // Name label below the chip
      const lbl = document.createElement('div');
      lbl.className   = 'token-label';
      lbl.textContent = t.name || '';
      el.appendChild(lbl);

      attachDrag(el, t.id);
      return el;
    }

    // ── Drag & drop ─────────────────────────────────────────────
    function attachDrag(el, tokenId) {
      let startClientX, startClientY, startLeft, startTop;

      el.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;
        if (drawMode) return; // drawing mode takes over
        e.preventDefault();
        e.stopPropagation();

        draggingId = tokenId;
        el.setPointerCapture(e.pointerId);
        el.classList.add('dragging');

        startClientX = e.clientX;
        startClientY = e.clientY;
        startLeft    = parseInt(el.style.left);
        startTop     = parseInt(el.style.top);
      });

      el.addEventListener('pointermove', (e) => {
        if (draggingId !== tokenId) return;
        e.preventDefault();

        el.style.left = (startLeft + e.clientX - startClientX) + 'px';
        el.style.top  = (startTop  + e.clientY - startClientY) + 'px';

        highlightCells(e.clientX, e.clientY, tokens[tokenId]?.size);
      });

      el.addEventListener('pointerup', (e) => {
        if (draggingId !== tokenId) return;

        el.classList.remove('dragging');
        clearHighlight();
        draggingId = null;

        const { row, col } = snapToCell(e.clientX, e.clientY, tokens[tokenId]?.size);

        // Snap the element visually right away
        const layout = tokenLayout(row, col, tokens[tokenId]?.size);
        el.style.top  = layout.top  + 'px';
        el.style.left = layout.left + 'px';

        // Persist to Firebase
        if (tokens[tokenId]) {
          tokens[tokenId].row = row;
          tokens[tokenId].col = col;
          set(ref(db, `board/tokens/${tokenId}`), tokens[tokenId]);
        }
      });

      // Pointer left the window while dragging — snap back
      el.addEventListener('lostpointercapture', () => {
        if (draggingId === tokenId) {
          clearHighlight();
          draggingId = null;
          renderTokens();
        }
      });
    }

    // Work out which cell the pointer is over, clamped to grid bounds
    function snapToCell(clientX, clientY, size) {
      const rect = grid.getBoundingClientRect();
      const sq   = sizeToSquares(size);
      const { fracCol, fracRow } = screenToFrac(clientX - rect.left, clientY - rect.top);

      let col = Math.max(0, Math.min(GRID_COLS - sq, Math.floor(fracCol)));
      let row = Math.max(0, Math.min(GRID_ROWS - sq, Math.floor(fracRow)));

      return { row, col };
    }

    function highlightCells(clientX, clientY, size) {
      clearHighlight();
      const { row, col } = snapToCell(clientX, clientY, size);
      const sq = sizeToSquares(size);

      for (let r = row; r < row + sq; r++) {
        for (let c = col; c < col + sq; c++) {
          // Children always stored in logical row-major order with GRID_COLS cols per row
          const cellEl = grid.children[r * GRID_COLS + c];
          if (cellEl?.classList.contains('cell')) cellEl.classList.add('drag-over');
        }
      }
    }

    function clearHighlight() {
      grid.querySelectorAll('.cell.drag-over').forEach(c => c.classList.remove('drag-over'));
    }

    function renderSidebar() {
      const list = document.getElementById('token-list');

    // ── Add Token modal ─────────────────────────────────────────

    // ── Token image & crop ───────────────────────────────────────
    let cropTokenId   = null;
    let cropNatImg    = null;
    let cropX, cropY, cropR;
    let imgDisplayW,  imgDisplayH;

    document.getElementById('img-upload').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      cropTokenId = e.target.dataset.tokenId;
      openCropModal(file);
      e.target.value = '';
    });

    function openCropModal(file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          cropNatImg = img;
          const maxW  = Math.min(440, window.innerWidth  - 80);
          const maxH  = Math.min(360, window.innerHeight - 200);
          const ratio = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
          imgDisplayW = Math.round(img.naturalWidth  * ratio);
          imgDisplayH = Math.round(img.naturalHeight * ratio);

          const imgEl = document.getElementById('crop-img');
          imgEl.src          = ev.target.result;
          imgEl.style.width  = imgDisplayW + 'px';
          imgEl.style.height = imgDisplayH + 'px';

          const container = document.getElementById('crop-container');
          container.style.width  = imgDisplayW + 'px';
          container.style.height = imgDisplayH + 'px';

          cropR = Math.round(Math.min(imgDisplayW, imgDisplayH) * 0.38);
          cropX = Math.round(imgDisplayW / 2);
          cropY = Math.round(imgDisplayH / 2);

          updateCropCircle();
          document.getElementById('crop-overlay').classList.add('show');
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function updateCropCircle() {
      const el = document.getElementById('crop-circle');
      el.style.width  = (cropR * 2) + 'px';
      el.style.height = (cropR * 2) + 'px';
      el.style.left   = (cropX - cropR) + 'px';
      el.style.top    = (cropY - cropR) + 'px';
    }

    // Move or resize based on where in the circle the pointer lands
    const cropCircleEl = document.getElementById('crop-circle');
    const EDGE_PX      = 16; // px from border that counts as "edge zone"

    function distFromCropCenter(clientX, clientY) {
      const rect = cropCircleEl.getBoundingClientRect();
      const dx   = clientX - (rect.left + cropR);
      const dy   = clientY - (rect.top  + cropR);
      return Math.sqrt(dx * dx + dy * dy);
    }

    // Update cursor to hint move vs resize
    cropCircleEl.addEventListener('pointermove', (e) => {
      if (e.buttons !== 0) return; // don't flicker cursor while dragging
      cropCircleEl.style.cursor = distFromCropCenter(e.clientX, e.clientY) > cropR - EDGE_PX
        ? 'nwse-resize'
        : 'move';
    });

    cropCircleEl.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      cropCircleEl.setPointerCapture(e.pointerId);

      const isEdge = distFromCropCenter(e.clientX, e.clientY) > cropR - EDGE_PX;

      if (isEdge) {
        // ── Resize mode: track distance from circle center ──
        const containerRect = document.getElementById('crop-container').getBoundingClientRect();
        const centerCX      = containerRect.left + cropX;
        const centerCY      = containerRect.top  + cropY;

        const onMove = (me) => {
          const dx   = me.clientX - centerCX;
          const dy   = me.clientY - centerCY;
          const dist = Math.round(Math.sqrt(dx * dx + dy * dy));
          const maxR = Math.min(cropX, cropY, imgDisplayW - cropX, imgDisplayH - cropY);
          cropR = Math.max(20, Math.min(maxR, dist));
          updateCropCircle();
        };
        const onUp = () => {
          cropCircleEl.removeEventListener('pointermove', onMove);
          cropCircleEl.removeEventListener('pointerup',   onUp);
        };
        cropCircleEl.addEventListener('pointermove', onMove);
        cropCircleEl.addEventListener('pointerup',   onUp);

      } else {
        // ── Move mode: drag the circle around ──
        const startX  = e.clientX, startY  = e.clientY;
        const startCX = cropX,     startCY = cropY;

        const onMove = (me) => {
          cropX = Math.max(cropR, Math.min(imgDisplayW - cropR, startCX + me.clientX - startX));
          cropY = Math.max(cropR, Math.min(imgDisplayH - cropR, startCY + me.clientY - startY));
          updateCropCircle();
        };
        const onUp = () => {
          cropCircleEl.removeEventListener('pointermove', onMove);
          cropCircleEl.removeEventListener('pointerup',   onUp);
        };
        cropCircleEl.addEventListener('pointermove', onMove);
        cropCircleEl.addEventListener('pointerup',   onUp);
      }
    });

    // Confirm: canvas-crop → save to Firebase
    document.getElementById('crop-confirm').addEventListener('click', () => {
      const out    = 200;
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = out;
      const ctx    = canvas.getContext('2d');

      ctx.beginPath();
      ctx.arc(out / 2, out / 2, out / 2, 0, Math.PI * 2);
      ctx.clip();

      const scaleX    = cropNatImg.naturalWidth  / imgDisplayW;
      const scaleY    = cropNatImg.naturalHeight / imgDisplayH;
      const natCX     = cropX * scaleX;
      const natCY     = cropY * scaleY;
      const natR      = cropR * (scaleX + scaleY) / 2;

      ctx.drawImage(cropNatImg, natCX - natR, natCY - natR, natR * 2, natR * 2, 0, 0, out, out);

      set(ref(db, `board/tokens/${cropTokenId}/image`), canvas.toDataURL('image/jpeg', 0.85));
      document.getElementById('crop-overlay').classList.remove('show');
    });

    document.getElementById('crop-cancel').addEventListener('click', () => {
      document.getElementById('crop-overlay').classList.remove('show');
    });

    // ── Drawing Mode ──────────────────────────────────────────────
    let drawMode   = false;
    let activeTool = 'rect'; // 'rect' | 'pen' | 'eraser'
    let zones      = {};
    let drawStrokes = {};
    let lastDrawnRef  = null; // for undo
    let labelModalMode = 'zone'; // 'zone' | 'stroke'
    let penTempData    = null;

    // Firebase listeners for zones and strokes
    onValue(ref(db, 'board/zones'), (snap) => {
      zones = snap.val() || {};
      renderZones();
    });
    onValue(ref(db, 'board/strokes'), (snap) => {
      drawStrokes = snap.val() || {};
      renderStrokes();
    });

    // Toggle draw mode
    document.getElementById('draw-mode-btn').addEventListener('click', () => {
      drawMode = !drawMode;
      document.getElementById('draw-mode-btn').classList.toggle('active', drawMode);
      document.getElementById('draw-toolbar').classList.toggle('show', drawMode);
      const captLayer = document.getElementById('draw-capture-layer');
      captLayer.style.display = drawMode ? 'block' : 'none';
      updateCaptureCursor();
      if (!drawMode) { selectedZoneId = null; renderZones(); }
    });

    // Tool selection
    ['tool-rect', 'tool-pen', 'tool-eraser'].forEach(btnId => {
      document.getElementById(btnId).addEventListener('click', () => {
        activeTool = btnId.replace('tool-', '');
        document.querySelectorAll('.draw-tool').forEach(b => b.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
        updateCaptureCursor();
      });
    });

    function updateCaptureCursor() {
      const cap = document.getElementById('draw-capture-layer');
      cap.classList.toggle('mode-eraser', activeTool === 'eraser');
    }

    // ── Zone rendering & selection ────────────────────────────────
    let selectedZoneId = null;

    function renderZones() {
      const layer = document.getElementById('zones-layer');
      layer.innerHTML = '';
      const cs = cellSize();
      Object.values(zones).forEach(z => {
        const r1 = Math.min(z.row1, z.row2);
        const c1 = Math.min(z.col1, z.col2);
        const r2 = Math.max(z.row1, z.row2);
        const c2 = Math.max(z.col1, z.col2);
        const el = document.createElement('div');
        el.className = 'zone-overlay';
        if (z.id === selectedZoneId) el.classList.add('selected');
        let pos;
        if (isPortrait) {
          pos = `top:${r1*cs}px;left:${c1*cs}px;width:${(c2-c1+1)*cs}px;height:${(r2-r1+1)*cs}px;`;
        } else {
          pos = `top:${c1*cs}px;left:${(10-r2)*cs}px;width:${(r2-r1+1)*cs}px;height:${(c2-c1+1)*cs}px;`;
        }
        el.style.cssText = pos + `background:${z.color}44;border:2px solid ${z.color}bb;`;
        layer.appendChild(el);
      });
      // Show/hide delete button in toolbar
      const container = document.getElementById('zone-del-container');
      const sep       = document.getElementById('zone-del-sep');
      if (selectedZoneId && zones[selectedZoneId]) {
        const z = zones[selectedZoneId];
        document.getElementById('zone-sel-label').textContent = z.label ? `"${z.label}"` : 'Selected zone';
        container.style.display = 'flex';
        sep.style.display = 'block';
      } else {
        container.style.display = 'none';
        sep.style.display = 'none';
      }
    }

    // Zone delete button (hold-to-delete)
    {
      const btn = document.getElementById('zone-del-btn');
      let holdTimer = null;
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        btn.setPointerCapture(e.pointerId);
        btn.classList.add('holding');
        holdTimer = setTimeout(() => {
          if (selectedZoneId) {
            remove(ref(db, `board/zones/${selectedZoneId}`));
            lastDrawnRef = null;
            selectedZoneId = null;
          }
        }, 1000);
      });
      const cancel = () => { btn.classList.remove('holding'); clearTimeout(holdTimer); };
      btn.addEventListener('pointerup',     cancel);
      btn.addEventListener('pointercancel', cancel);
    }

    // ── Stroke rendering ──────────────────────────────────────────
    function renderStrokes() {
      const svg = document.getElementById('stroke-layer');
      svg.querySelectorAll('path[data-id]').forEach(p => p.remove());
      const cs = cellSize();
      Object.values(drawStrokes).forEach(s => {
        if (!s.pts || s.pts.length < 4) return;
        const pathEl = makeSVGPath(s, cs);
        pathEl.dataset.id = s.id;
        svg.appendChild(pathEl);
      });
    }

    function ptsToSVGd(pts, cs) {
      // pts = [col, row, col, row, ...] in logical cell coords
      const px = (col, row) => isPortrait ? col * cs : (GRID_ROWS - row) * cs;
      const py = (col, row) => isPortrait ? row * cs : col * cs;
      let d = `M ${px(pts[0], pts[1])} ${py(pts[0], pts[1])}`;
      for (let i = 2; i < pts.length; i += 2) d += ` L ${px(pts[i], pts[i+1])} ${py(pts[i], pts[i+1])}`;
      return d;
    }

    function makeSVGPath(s, cs) {
      const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      el.setAttribute('d', ptsToSVGd(s.pts, cs));
      el.setAttribute('stroke', s.color);
      el.setAttribute('stroke-width', s.width * cs / BASE_CELL);
      el.setAttribute('fill', 'none');
      el.setAttribute('stroke-linecap', 'round');
      el.setAttribute('stroke-linejoin', 'round');
      return el;
    }

    // ── Draw capture layer events ─────────────────────────────────
    let zoneDrawing = false;
    let zoneDraftR1, zoneDraftC1, zoneDraftR2, zoneDraftC2;
    let zoneDraftEl = null;
    let zoneDownX   = 0, zoneDownY = 0;

    let penDrawing = false;
    let penPts     = [];
    let livePenEl  = null;

    const captLayer = document.getElementById('draw-capture-layer');

    function getCaptureCoords(e) {
      const rect = grid.getBoundingClientRect();
      const { fracCol, fracRow } = screenToFrac(e.clientX - rect.left, e.clientY - rect.top);
      const cellCol = Math.max(0, Math.min(GRID_COLS - 1, Math.floor(fracCol)));
      const cellRow = Math.max(0, Math.min(GRID_ROWS - 1, Math.floor(fracRow)));
      return { fracCol, fracRow, cellCol, cellRow };
    }

    captLayer.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      captLayer.setPointerCapture(e.pointerId);
      const { fracCol, fracRow, cellCol, cellRow } = getCaptureCoords(e);

      if (activeTool === 'rect') {
        zoneDownX = e.clientX; zoneDownY = e.clientY;
        zoneDraftR1 = zoneDraftR2 = cellRow;
        zoneDraftC1 = zoneDraftC2 = cellCol;
        zoneDrawing = true;
        showZoneDraft();
      } else if (activeTool === 'pen') {
        penDrawing = true;
        penPts = [fracCol, fracRow];
        const cs = cellSize();
        livePenEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        livePenEl.setAttribute('stroke', document.getElementById('draw-color').value);
        livePenEl.setAttribute('stroke-width', parseInt(document.getElementById('draw-width').value) * cs / BASE_CELL);
        livePenEl.setAttribute('fill', 'none');
        livePenEl.setAttribute('stroke-linecap', 'round');
        livePenEl.setAttribute('stroke-linejoin', 'round');
        document.getElementById('stroke-layer').appendChild(livePenEl);
        updateLivePen();
      } else if (activeTool === 'eraser') {
        eraseAt(fracCol, fracRow);
      }
    });

    captLayer.addEventListener('pointermove', (e) => {
      if (!e.buttons) return;
      const { fracCol, fracRow, cellCol, cellRow } = getCaptureCoords(e);

      if (activeTool === 'rect' && zoneDrawing) {
        zoneDraftR2 = Math.max(0, Math.min(GRID_ROWS - 1, cellRow));
        zoneDraftC2 = Math.max(0, Math.min(GRID_COLS - 1, cellCol));
        showZoneDraft();
      } else if (activeTool === 'pen' && penDrawing) {
        // Only add point if moved enough (avoid huge arrays)
        const cs      = cellSize();
        const minDist = 4 / cs;
        const lx = penPts[penPts.length - 2], ly = penPts[penPts.length - 1];
        if ((fracCol-lx)**2 + (fracRow-ly)**2 > minDist**2) {
          penPts.push(fracCol, fracRow);
          updateLivePen();
        }
      } else if (activeTool === 'eraser') {
        eraseAt(fracCol, fracRow);
      }
    });

    captLayer.addEventListener('pointerup', (e) => {
      const { fracCol, fracRow, cellCol, cellRow } = getCaptureCoords(e);

      if (activeTool === 'rect' && zoneDrawing) {
        zoneDrawing = false;
        clearZoneDraft();
        // Distinguish click vs drag
        const moved = Math.abs(e.clientX - zoneDownX) + Math.abs(e.clientY - zoneDownY) > 5;
        if (!moved) {
          // Click — select/deselect zone containing this cell
          selectZoneAt(cellCol, cellRow);
        } else {
          // Drag — open label modal to create zone
          document.getElementById('zone-label-input').value = '';
          document.getElementById('zone-modal').classList.add('show');
          document.getElementById('zone-label-input').focus();
        }
      } else if (activeTool === 'pen' && penDrawing) {
        penDrawing = false;
        if (livePenEl) { livePenEl.remove(); livePenEl = null; }
        if (penPts.length >= 4) {
          penTempData = {
            id:    's_' + Date.now(),
            color: document.getElementById('draw-color').value,
            width: parseInt(document.getElementById('draw-width').value),
            pts:   penPts.slice()
          };
          labelModalMode = 'stroke';
          document.getElementById('zone-modal-title').textContent = 'New Stroke';
          document.getElementById('zone-label-input').value = '';
          document.getElementById('zone-modal').classList.add('show');
          document.getElementById('zone-label-input').focus();
        }
        penPts = [];
      }
    });

    function showZoneDraft() {
      if (!zoneDraftEl) {
        zoneDraftEl = document.createElement('div');
        document.getElementById('zones-layer').appendChild(zoneDraftEl);
      }
      const cs    = cellSize();
      const color = document.getElementById('draw-color').value;
      const r1 = Math.min(zoneDraftR1, zoneDraftR2), r2 = Math.max(zoneDraftR1, zoneDraftR2);
      const c1 = Math.min(zoneDraftC1, zoneDraftC2), c2 = Math.max(zoneDraftC1, zoneDraftC2);
      let draftPos;
      if (isPortrait) {
        draftPos = `top:${r1*cs}px;left:${c1*cs}px;width:${(c2-c1+1)*cs}px;height:${(r2-r1+1)*cs}px;`;
      } else {
        draftPos = `top:${c1*cs}px;left:${(10-r2)*cs}px;width:${(r2-r1+1)*cs}px;height:${(c2-c1+1)*cs}px;`;
      }
      zoneDraftEl.style.cssText = `position:absolute;${draftPos}background:${color}33;border:2px dashed ${color}cc;border-radius:2px;pointer-events:none;z-index:8;`;
    }

    function clearZoneDraft() {
      if (zoneDraftEl) { zoneDraftEl.remove(); zoneDraftEl = null; }
    }

    function updateLivePen() {
      if (!livePenEl || penPts.length < 2) return;
      const cs = cellSize();
      livePenEl.setAttribute('d', ptsToSVGd(penPts, cs));
      livePenEl.setAttribute('stroke-width', parseInt(document.getElementById('draw-width').value) * cs / BASE_CELL);
    }

    function eraseAt(fracCol, fracRow) {
      const cs          = cellSize();
      const eraseRadius = 20 / cs; // 20px in cell units

      // Erase strokes
      for (const [id, s] of Object.entries(drawStrokes)) {
        if (!s.pts) continue;
        for (let i = 0; i < s.pts.length; i += 2) {
          const dx = s.pts[i] - fracCol, dy = s.pts[i+1] - fracRow;
          if (dx*dx + dy*dy < eraseRadius*eraseRadius) {
            remove(ref(db, `board/strokes/${id}`));
            break;
          }
        }
      }

      // Erase zones
      for (const [id, z] of Object.entries(zones)) {
        const r1 = Math.min(z.row1, z.row2), r2 = Math.max(z.row1, z.row2);
        const c1 = Math.min(z.col1, z.col2), c2 = Math.max(z.col1, z.col2);
        if (fracRow >= r1 && fracRow <= r2 + 1 && fracCol >= c1 && fracCol <= c2 + 1) {
          remove(ref(db, `board/zones/${id}`));
          break;
        }
      }
    }

    function selectZoneAt(col, row) {
      let found = null;
      for (const z of Object.values(zones)) {
        const r1 = Math.min(z.row1, z.row2), r2 = Math.max(z.row1, z.row2);
        const c1 = Math.min(z.col1, z.col2), c2 = Math.max(z.col1, z.col2);
        if (row >= r1 && row <= r2 && col >= c1 && col <= c2) { found = z.id; break; }
      }
      selectedZoneId = (found === selectedZoneId) ? null : found;
      renderZones();
    }

    // Zone label modal confirm / cancel
    document.getElementById('zone-confirm').addEventListener('click', () => {
      const label = document.getElementById('zone-label-input').value.trim();
      if (labelModalMode === 'stroke' && penTempData) {
        penTempData.label = label;
        set(ref(db, `board/strokes/${penTempData.id}`), penTempData);
        lastDrawnRef = `board/strokes/${penTempData.id}`;
        penTempData = null;
      } else {
        const id   = 'z_' + Date.now();
        const data = {
          id,
          row1:  Math.min(zoneDraftR1, zoneDraftR2),
          col1:  Math.min(zoneDraftC1, zoneDraftC2),
          row2:  Math.max(zoneDraftR1, zoneDraftR2),
          col2:  Math.max(zoneDraftC1, zoneDraftC2),
          color: document.getElementById('draw-color').value,
          label
        };
        set(ref(db, `board/zones/${id}`), data);
        lastDrawnRef = `board/zones/${id}`;
      }
      labelModalMode = 'zone';
      document.getElementById('zone-modal-title').textContent = 'New Zone';
      document.getElementById('zone-modal').classList.remove('show');
    });

    function closeZoneModal() {
      labelModalMode = 'zone';
      penTempData = null;
      document.getElementById('zone-modal-title').textContent = 'New Zone';
      document.getElementById('zone-modal').classList.remove('show');
    }

    document.getElementById('zone-cancel').addEventListener('click', closeZoneModal);

    document.getElementById('zone-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('zone-modal')) closeZoneModal();
    });

    document.getElementById('zone-label-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('zone-confirm').click();
    });

    // Undo last drawn item
    document.getElementById('draw-undo').addEventListener('click', () => {
      if (!lastDrawnRef) return;
      remove(ref(db, lastDrawnRef));
      lastDrawnRef = null;
    });

    // ── Stroke hover tooltip ──────────────────────────────────────
    const strokeTooltipEl = document.getElementById('stroke-tooltip');

    document.querySelector('.map-area').addEventListener('mousemove', (e) => {
      if (drawMode) { strokeTooltipEl.style.display = 'none'; return; }
      const rect        = grid.getBoundingClientRect();
      const cs          = cellSize();
      const { fracCol, fracRow } = screenToFrac(e.clientX - rect.left, e.clientY - rect.top);
      const hoverRadius = 14 / cs; // 14px in cell units

      let foundLabel = null;

      // Check strokes
      for (const s of Object.values(drawStrokes)) {
        if (!s.label || !s.pts) continue;
        for (let i = 0; i < s.pts.length; i += 2) {
          const dx = s.pts[i] - fracCol, dy = s.pts[i+1] - fracRow;
          if (dx*dx + dy*dy < hoverRadius*hoverRadius) { foundLabel = s.label; break; }
        }
        if (foundLabel) break;
      }

      // Check zones (if no stroke label found yet)
      if (!foundLabel) {
        for (const z of Object.values(zones)) {
          if (!z.label) continue;
          const r1 = Math.min(z.row1, z.row2), r2 = Math.max(z.row1, z.row2);
          const c1 = Math.min(z.col1, z.col2), c2 = Math.max(z.col1, z.col2);
          if (fracRow >= r1 && fracRow <= r2 + 1 && fracCol >= c1 && fracCol <= c2 + 1) {
            foundLabel = z.label;
            break;
          }
        }
      }

      if (foundLabel) {
        strokeTooltipEl.textContent   = foundLabel;
        strokeTooltipEl.style.display = 'block';
        strokeTooltipEl.style.left    = (e.clientX + 14) + 'px';
        strokeTooltipEl.style.top     = (e.clientY - 30) + 'px';
      } else {
        strokeTooltipEl.style.display = 'none';
      }
    });

    document.querySelector('.map-area').addEventListener('mouseleave', () => {
      strokeTooltipEl.style.display = 'none';
    });

    buildGrid();

    // ── Map Editor ───────────────────────────────────────────────
    onValue(ref(db, 'board/cells'), (snap) => {
      boardCells = snap.val() || {};
      buildGrid();
    });

    const mapEditorOverlay = document.getElementById('map-editor-overlay');
    let editorCells    = {};      // working copy: { "r_c": tileType } while editor is open
    let editorCols     = 8;
    let editorRows     = 11;
    let editorMode     = 'quick'; // 'quick' | 'detailed'
    let selectedTile   = 'void';  // active palette selection in detailed mode
    let editorPainting = false;
    let editorPaintVoid = true;   // quick mode: true = painting void, false = active

    function cellEditorClass(tileVal) {
      if (!tileVal) return 'editor-cell';
      if (tileVal === 'void' || tileVal === true) return 'editor-cell void';
      return 'editor-cell tile-' + tileVal;
    }

    function buildEditorGrid() {
      const gridEl = document.getElementById('editor-grid');
      gridEl.style.gridTemplateColumns = `repeat(${editorCols}, 1fr)`;
      gridEl.innerHTML = '';
      for (let r = 0; r < editorRows; r++) {
        for (let c = 0; c < editorCols; c++) {
          const cell = document.createElement('div');
          cell.className = cellEditorClass(editorCells[r + '_' + c]);
          cell.dataset.r = r;
          cell.dataset.c = c;
          gridEl.appendChild(cell);
        }
      }
    }

    function paintEditorCell(el) {
      const key = el.dataset.r + '_' + el.dataset.c;
      if (editorMode === 'quick') {
        el.className = editorPaintVoid ? 'editor-cell void' : 'editor-cell';
        if (editorPaintVoid) editorCells[key] = 'void';
        else delete editorCells[key];
      } else {
        if (selectedTile === 'erase') {
          el.className = 'editor-cell';
          delete editorCells[key];
        } else {
          el.className = cellEditorClass(selectedTile);
          editorCells[key] = selectedTile;
        }
      }
    }

    document.getElementById('editor-grid').addEventListener('mousedown', (e) => {
      const cell = e.target.closest('.editor-cell');
      if (!cell) return;
      e.preventDefault();
      editorPainting = true;
      if (editorMode === 'quick') editorPaintVoid = !cell.classList.contains('void');
      paintEditorCell(cell);
    });

    document.getElementById('editor-grid').addEventListener('mousemove', (e) => {
      if (!editorPainting) return;
      const cell = e.target.closest('.editor-cell');
      if (cell) paintEditorCell(cell);
    });

    document.addEventListener('mouseup', () => { editorPainting = false; });

    document.getElementById('editor-cols').addEventListener('change', (e) => {
      editorCols = Math.max(2, Math.min(30, parseInt(e.target.value) || 8));
      e.target.value = editorCols;
      buildEditorGrid();
    });

    document.getElementById('editor-rows').addEventListener('change', (e) => {
      editorRows = Math.max(2, Math.min(30, parseInt(e.target.value) || 11));
      e.target.value = editorRows;
      buildEditorGrid();
    });

    // Mode toggle
    function setEditorMode(mode) {
      editorMode = mode;
      document.getElementById('mode-quick').classList.toggle('active', mode === 'quick');
      document.getElementById('mode-detailed').classList.toggle('active', mode === 'detailed');
      document.getElementById('tile-palette').style.display = mode === 'detailed' ? 'flex' : 'none';
      document.getElementById('editor-hint').textContent = mode === 'quick'
        ? 'Click or drag cells to toggle active (green) / void (black).'
        : 'Select a tile then click or drag to paint cells.';
    }

    document.getElementById('mode-quick').addEventListener('click',    () => setEditorMode('quick'));
    document.getElementById('mode-detailed').addEventListener('click',  () => setEditorMode('detailed'));

    // Palette selection
    document.getElementById('tile-palette').addEventListener('click', (e) => {
      const swatch = e.target.closest('.palette-swatch');
      if (!swatch) return;
      selectedTile = swatch.dataset.tile;
      document.querySelectorAll('.palette-swatch').forEach(s => s.classList.remove('selected'));
      swatch.classList.add('selected');
    });

    document.getElementById('map-editor-btn').addEventListener('click', () => {
      editorCols  = GRID_COLS;
      editorRows  = GRID_ROWS;
      editorCells = Object.assign({}, boardCells);
      document.getElementById('editor-cols').value = editorCols;
      document.getElementById('editor-rows').value = editorRows;
      setEditorMode('quick');
      buildEditorGrid();
      mapEditorOverlay.classList.add('show');
    });

    document.getElementById('editor-cancel').addEventListener('click', () => {
      mapEditorOverlay.classList.remove('show');
    });
    mapEditorOverlay.addEventListener('click', (e) => {
      if (e.target === mapEditorOverlay) mapEditorOverlay.classList.remove('show');
    });

    document.getElementById('editor-reset').addEventListener('click', () => {
      editorCells = {};
      buildEditorGrid();
    });

    document.getElementById('editor-apply').addEventListener('click', () => {
      set(ref(db, 'board/cols'),  editorCols);
      set(ref(db, 'board/rows'),  editorRows);
      set(ref(db, 'board/cells'), Object.keys(editorCells).length ? editorCells : null);
      mapEditorOverlay.classList.remove('show');
    });

  </script>

  <!-- Map Editor modal -->
  <div class="overlay" id="map-editor-overlay">
    <div class="map-editor-modal">
      <h2>Map Editor</h2>
      <div class="editor-mode-toggle">
        <button class="mode-btn active" id="mode-quick">Quick</button>
        <button class="mode-btn"        id="mode-detailed">Detailed</button>
      </div>
      <div class="editor-dims">
        <label>Columns</label>
        <input type="number" id="editor-cols" min="2" max="30" value="8">
        <span>×</span>
        <label>Rows</label>
        <input type="number" id="editor-rows" min="2" max="30" value="11">
      </div>
      <div class="tile-palette" id="tile-palette" style="display:none">
        <div class="palette-swatch selected" data-tile="void">⬛ Void</div>
        <div class="palette-swatch" data-tile="erase">⌫ Erase</div>
        <div class="palette-swatch" data-tile="default">⬛ Default</div>
        <div class="palette-swatch" data-tile="cobblestone">🪨 Cobble</div>
        <div class="palette-swatch" data-tile="forest">🌿 Forest</div>
        <div class="palette-swatch" data-tile="desert">🏜️ Desert</div>
        <div class="palette-swatch" data-tile="water">💧 Water</div>
        <div class="palette-swatch" data-tile="volcanic">🌋 Volcanic</div>
      </div>
      <p class="editor-hint" id="editor-hint">Click or drag cells to toggle active (green) / void (black).</p>
      <div class="editor-grid-wrap">
        <div class="editor-grid" id="editor-grid"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-dark" id="editor-cancel">Cancel</button>
        <button class="btn btn-dark" id="editor-reset">All Active</button>
        <button class="btn btn-red"  id="editor-apply">Apply</button>
      </div>
    </div>
  </div>

</body>
</html>
